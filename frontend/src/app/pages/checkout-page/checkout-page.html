<div class="container mt-4">
  <h2 class="mb-4">Checkout</h2>

  <div class="row">
    <div class="col-md-7">
      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title mb-3">Shipping Information</h5>

          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" placeholder="John Doe" />
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="john@example.com" />
          </div>

          <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" placeholder="123 Main St" />
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">City</label>
              <input type="text" class="form-control" placeholder="New York" />
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label">State</label>
              <input type="text" class="form-control" placeholder="NY" />
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label">Zip Code</label>
              <input type="text" class="form-control" placeholder="10001" />
            </div>
          </div>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title mb-3">Payment Information</h5>

          <div class="mb-3">
            <label class="form-label">Card Number</label>
            <input type="text" class="form-control" placeholder="1234 5678 9012 3456" />
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Expiry Date</label>
              <input type="text" class="form-control" placeholder="MM/YY" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">CVV</label>
              <input type="text" class="form-control" placeholder="123" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-5">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">Order Summary</h5>

          <div *ngFor="let item of cartItems()" class="d-flex justify-content-between mb-2">
            <span
              >{{ item.product.name }} <span class="text-muted">x{{ item.quantity }}</span></span
            >
            <span>{{ item.product.price * item.quantity | currency }}</span>
          </div>

          <hr />

          <div class="d-flex justify-content-between mb-2">
            <span>Shipping</span>
            <span>Free</span>
          </div>

          <div class="d-flex justify-content-between fw-bold fs-5">
            <span>Total</span>
            <span>{{ total() | currency }}</span>
          </div>

          <button class="btn btn-success w-100 mt-4" (click)="placeOrder()">Place Order</button>
          <a routerLink="/cart" class="btn btn-outline-secondary w-100 mt-2">Back to Cart</a>
        </div>
      </div>
    </div>
  </div>
</div>
