<div class="container mt-4">
  <h2 class="mb-4">Order History</h2>

  <div *ngIf="orders().length === 0" class="text-center p-5 bg-light rounded">
    <h4>No orders yet</h4>
    <a routerLink="/search" class="btn btn-primary mt-3">Start Shopping</a>
  </div>

  <div *ngFor="let order of orders()" class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
      <div>
        <span class="fw-bold">Order #{{ order.id }}</span>
        <span class="text-muted ms-3">{{ order.date }}</span>
      </div>
      <span [class]="getStatusClass(order.status)">{{ order.status }}</span>
    </div>

    <div class="card-body">
      <div *ngFor="let item of order.items" class="d-flex justify-content-between mb-2">
        <span>{{ item.name }}</span>
        <span>{{ item.price | currency }}</span>
      </div>

      <hr />

      <div class="d-flex justify-content-between fw-bold">
        <span>Total</span>
        <span>{{ order.total | currency }}</span>
      </div>
    </div>

    <div class="card-footer d-flex justify-content-end gap-2">
      <button class="btn btn-outline-primary btn-sm">View Details</button>
      <button class="btn btn-outline-danger btn-sm">Cancel Order</button>
    </div>
  </div>

  <div class="text-center mt-2">
    <a routerLink="/" class="btn btn-outline-secondary">Back to Home</a>
  </div>
</div>
