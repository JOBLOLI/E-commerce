<div class="container mt-4">
  <h2 class="mb-4">Your Cart</h2>

  <div *ngIf="cartItems().length === 0" class="text-center p-5 bg-light rounded">
    <h4>Your cart is empty</h4>
    <a routerLink="/search" class="btn btn-primary mt-3">Continue Shopping</a>
  </div>

  <div *ngFor="let item of cartItems()">
    <div class="card mb-3">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <img
            [src]="item.imageUrl"
            [alt]="item.name"
            style="width: 80px; height: 80px; object-fit: cover"
            class="me-3 rounded"
          />
          <div>
            <h5 class="mb-1">{{ item.name }}</h5>
            <p class="mb-0 text-muted">{{ item.price | currency }}</p>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-danger btn-sm">Remove</button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="cartItems().length > 0" class="card mt-4">
    <div class="card-body">
      <h5 class="card-title">Order Summary</h5>
      <div class="d-flex justify-content-between mb-2">
        <span>Subtotal</span>
        <span>{{ total() | currency }}</span>
      </div>
      <div class="d-flex justify-content-between mb-2">
        <span>Shipping</span>
        <span>Free</span>
      </div>
      <hr />
      <div class="d-flex justify-content-between fw-bold">
        <span>Total</span>
        <span>{{ total() | currency }}</span>
      </div>
      <button class="btn btn-success w-100 mt-3">Checkout</button>
      <a routerLink="/search" class="btn btn-outline-secondary w-100 mt-2">Continue Shopping</a>
    </div>
  </div>
</div>
