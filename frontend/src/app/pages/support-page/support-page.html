<div class="container mt-4">
  <div class="text-center mb-5">
    <h2 class="display-5">Support Center</h2>
    <p class="lead text-muted">Find answers to the most common questions below.</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <h4 class="mb-4">Frequently Asked Questions</h4>

      <div class="accordion" id="faqAccordion">
        <div *ngFor="let faq of faqs(); let i = index" class="accordion-item mb-2 border rounded">
          <h2 class="accordion-header">
            <button
              class="accordion-button"
              [class.collapsed]="!faq.open"
              type="button"
              (click)="toggleFaq(i)"
            >
              {{ faq.question }}
            </button>
          </h2>

          <div [class.show]="faq.open" class="accordion-collapse collapse">
            <div class="accordion-body text-muted">
              {{ faq.answer }}
            </div>
          </div>
        </div>
      </div>

      <!-- Back to Home -->
      <div class="text-center mt-5">
        <p class="text-muted">Still need help?</p>
        <a routerLink="/" class="btn btn-primary">Back to Home</a>
      </div>
    </div>
  </div>
</div>
