<div *ngIf="product() as p" class="container my-4">
  <div class="row">
    <div class="p-5 col-md-6">
      <img [src]="p.imageUrl" [alt]="p.name" class="img-fluid rounded" />
    </div>
    <div class="card p-5 col-md-6">
      <h1 class="card-title">{{ p.name }}</h1>
      <p class="card-text">{{ p.description }}</p>
      <p class="card-text"><strong>Price:</strong> {{ p.price | currency }}</p>

      <h5 class="card-subtitle text-muted mb-2">Categories</h5>
      <ul class="card list-group">
        <li *ngFor="let cat of p.categories" class="list-group-item">
          <strong>{{ cat.name }}</strong
          >: {{ cat.description }}
        </li>
      </ul>

      <button class="btn btn-primary mt-3">Add to Cart</button>
    </div>
  </div>
</div>
